# Production server for the dashboard SPA. Replicates the Vite dev proxy
# (vite.config.ts `server.proxy`) that does not exist in a built bundle: `/api`
# and `/ws` are forwarded to the FastAPI service, reachable as `api:8000` on the
# compose network. Everything else is the static SPA with a history fallback.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — defers `api` hostname resolution to request time so
    # nginx starts cleanly even when the api container isn't yet resolvable (e.g.
    # `docker compose restart dashboard` while api is down returns 502, not an
    # `[emerg] host not found` boot crash). valid=10s keeps the TTL short so a
    # recreated api container is picked up without restarting the dashboard.
    resolver 127.0.0.11 valid=10s;

    # Compress text-heavy assets for the planned Hetzner public URL.
    gzip on;
    gzip_types application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed bundles under /assets/ — safe to cache forever.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html is never hashed — must revalidate on every load so the browser
    # picks up a new bundle after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback: unknown client routes serve index.html so the
    # client router can take over (dev server does this implicitly). Placed after
    # /assets/ so the more-specific location wins for static files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST proxy. The variable form of proxy_pass (no URI part) preserves the
    # full request URI — /api/v1/... passes through unchanged so FastAPI's
    # APIRouter(prefix="/api/v1") matches. The variable also enables runtime DNS
    # re-resolution via the resolver above (static proxy_pass resolves once at
    # config-load and pins the IP until nginx restarts).
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for the live line-state socket (/ws/line-state). The
    # Upgrade/Connection headers + HTTP/1.1 are required for the protocol switch.
    # Long read+send timeouts keep the idle live socket from being culled.
    # Same variable pattern as /api/ for runtime DNS re-resolution.
    location /ws/ {
        set $api_ws http://api:8000;
        proxy_pass $api_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
