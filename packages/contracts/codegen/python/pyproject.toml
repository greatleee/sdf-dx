# Installable distribution for the generated Python DTOs (contract-first §2:
# consumers import these instead of hand-writing request/response/payload models).
#
# The *modules* under sdf_contracts/{kafka,openapi,sparkplug}/ are build output —
# regenerated by `make all` in packages/contracts and never hand-edited (ADR-0005).
# Only this file plus the empty __init__.py / py.typed markers are hand-authored
# packaging scaffold; `make all` does not touch them, so the drift gate
# (`git diff --exit-code codegen/`) stays green.
[project]
name = "sdf-contracts"
version = "0.1.0"
description = "Generated DTOs from the packages/contracts SoT schemas (OpenAPI, Kafka payloads, Sparkplug B)."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8",
  "protobuf>=5.29.3,<6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sdf_contracts"]
